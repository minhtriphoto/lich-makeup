<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ Lịch Makeup Studio - Auto Sync Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { rose: '#e8a4b8', deepRose: '#c0697f', blush: '#f5dde5', cream: '#fdf6f0', brown: '#5a3a3a', gold: '#c9a96e', dark: '#2d1f1f' },
                    fontFamily: { sans: ['DM Sans', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e8a4b8; border-radius: 10px; }
        .drag-over { background-color: #fdf2f5 !important; border: 2px dashed #c0697f !important; }
        .booking-card { transition: all 0.2s ease; }
        body { background-color: #fdf6f0; }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-scale-in { animation: scaleIn 0.2s ease-out; }
    </style>
</head>
<body class="text-dark antialiased min-h-screen flex flex-col">

    <header class="bg-gradient-to-r from-deepRose via-[#a3526b] to-brown text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="text-4xl">💄</span>
                <div>
                    <h1 class="font-serif text-2xl font-bold">Makeup Studio</h1>
                    <p class="text-[10px] uppercase tracking-[0.2em] opacity-80">Cloud Sync Active</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 bg-white/10 backdrop-blur-md rounded-full px-4 py-1.5 border border-white/20">
                    <button onclick="changeDate(-1)" class="hover:bg-white/20 rounded-full w-8 h-8">‹</button>
                    <div class="relative">
                        <span id="currentDateLabel" class="font-serif text-lg font-medium min-w-[150px] text-center cursor-pointer"></span>
                        <input type="date" id="datePicker" onchange="onDatePick()" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <button onclick="changeDate(1)" class="hover:bg-white/20 rounded-full w-8 h-8">›</button>
                </div>
                <button onclick="openModal()" class="bg-gold hover:bg-[#b8924a] text-white px-5 py-2.5 rounded-full font-medium shadow-lg flex items-center gap-2">
                    <span>+</span> Thêm Lịch
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto px-4 py-8 w-full">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-2xl p-5 shadow-sm border-l-4 border-rose flex items-center gap-4">
                <div class="text-2xl">📅</div>
                <div><p class="text-2xl font-serif text-deepRose font-bold" id="statTotal">0</p><p class="text-[10px] text-gray-400 font-bold uppercase">Hôm nay</p></div>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-sm border-l-4 border-gold flex items-center gap-4">
                <div class="text-2xl">✅</div>
                <div><p class="text-2xl font-serif text-deepRose font-bold" id="statDone">0</p><p class="text-[10px] text-gray-400 font-bold uppercase">Xong</p></div>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-sm border-l-4 border-[#6bb5a3] flex items-center gap-4">
                <div class="text-2xl">⏳</div>
                <div><p class="text-2xl font-serif text-deepRose font-bold" id="statPending">0</p><p class="text-[10px] text-gray-400 font-bold uppercase">Chờ duyệt</p></div>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-sm border-l-4 border-brown flex items-center gap-4">
                <div class="text-2xl">💰</div>
                <div><p class="text-lg font-serif text-deepRose font-bold" id="statRevenue">0đ</p><p class="text-[10px] text-gray-400 font-bold uppercase">Doanh thu</p></div>
            </div>
        </div>

        <div class="flex flex-wrap gap-3 items-center mb-6 bg-white p-3 rounded-2xl shadow-sm border border-blush">
            <input type="text" id="searchInput" oninput="renderSchedule()" placeholder="Tìm khách hàng, SĐT..." class="flex-1 min-w-[200px] bg-cream border border-blush rounded-xl px-4 py-2 text-sm outline-none focus:border-deepRose">
            <select id="filterStatus" onchange="renderSchedule()" class="bg-cream border border-blush rounded-xl px-4 py-2 text-sm outline-none">
                <option value="">Tất cả trạng thái</option>
                <option value="confirmed">✅ Đã chốt</option>
                <option value="pending">⏳ Chờ xác nhận</option>
                <option value="done">✔️ Hoàn thành</option>
            </select>
            <button onclick="pullFromSheet()" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-sm font-medium">🔄 Làm mới</button>
            <span id="syncStatus" class="text-[10px] font-bold px-3 py-2 rounded-lg bg-gray-100 text-gray-500 uppercase tracking-wider italic">Đang kiểm tra kết nối...</span>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-blush/50 overflow-hidden">
            <div id="scheduleBody" class="divide-y divide-blush/40 flex flex-col"></div>
        </div>
    </main>

    <div id="modalOverlay" class="fixed inset-0 bg-dark/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4" onclick="closeModalOutside(event)">
        <div class="bg-white rounded-3xl w-full max-w-2xl shadow-2xl overflow-hidden animate-scale-in">
            <div class="bg-gradient-to-r from-deepRose to-brown px-6 py-4 flex justify-between">
                <h2 id="modalTitle" class="font-serif text-xl text-white font-bold">✨ Lịch Makeup</h2>
                <button onclick="closeModal()" class="text-white text-2xl">&times;</button>
            </div>
            <div class="p-6 max-h-[80vh] overflow-y-auto">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><label class="text-[10px] font-bold text-brown uppercase">Bắt đầu</label><select id="fTimeStart" class="w-full bg-cream border border-blush rounded-xl px-3 py-2 text-sm outline-none"></select></div>
                    <div><label class="text-[10px] font-bold text-brown uppercase">Kết thúc</label><select id="fTimeEnd" class="w-full bg-cream border border-blush rounded-xl px-3 py-2 text-sm outline-none"></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><label class="text-[10px] font-bold text-brown uppercase">Khách hàng *</label><input type="text" id="fName" class="w-full bg-cream border border-blush rounded-xl px-3 py-2 text-sm outline-none"></div>
                    <div><label class="text-[10px] font-bold text-brown uppercase">Điện thoại</label><input type="tel" id="fPhone" class="w-full bg-cream border border-blush rounded-xl px-3 py-2 text-sm outline-none"></div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><label class="text-[10px] font-bold text-brown uppercase">Dịch vụ</label><select id="fService" class="w-full bg-cream border border-blush rounded-xl px-3 py-2 text-sm outline-none"><option>Makeup cô dâu</option><option>Makeup dự tiệc</option><option>Makeup sự kiện</option><option>Makeup kỷ yếu</option></select></div>
                    <div><label class="text-[10px] font-bold text-brown uppercase">Chi phí</label><input type="number" id="fPrice" class="w-full bg-cream border border-blush rounded-xl px-3 py-2 text-sm outline-none"></div>
                </div>
                <div class="mb-4"><label class="text-[10px] font-bold text-brown uppercase">Địa điểm</label><input type="text" id="fAddress" class="w-full bg-cream border border-blush rounded-xl px-3 py-2 text-sm outline-none"></div>
                <div class="mb-6"><label class="text-[10px] font-bold text-brown uppercase">Ghi chú</label><textarea id="fNote" rows="2" class="w-full bg-cream border border-blush rounded-xl px-3 py-2 text-sm outline-none"></textarea></div>
                <div class="flex justify-end gap-3"><button onclick="closeModal()" class="px-6 py-2 rounded-xl bg-gray-100">Huỷ</button><button onclick="saveBooking()" class="px-6 py-2 rounded-xl bg-deepRose text-white font-bold">Lưu & Đồng bộ</button></div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-dark text-white px-6 py-3 rounded-xl shadow-2xl text-sm transform translate-y-20 opacity-0 transition-all duration-300 z-50"></div>

    <script>
        // ======= [QUAN TRỌNG] THAY LINK CỦA BẠN VÀO ĐÂY =======
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZ6wjR-LDzsEDk4Yrlo2vmZwaXO74IeR-Xtejg3tVxrO1d-SJTIYEJVXu0Y4T-_5DK/exec"; 
        // ======================================================

        let currentDate = new Date();
        let bookings = [];
        let isSyncing = false;

        const STATUS_UI = {
            'pending': { color: 'bg-yellow-50 text-yellow-700 border-yellow-200', text: '⏳ Chờ duyệt' },
            'confirmed': { color: 'bg-blue-50 text-blue-700 border-blue-200', text: '✅ Đã chốt' },
            'done': { color: 'bg-green-50 text-green-700 border-green-200', text: '✔️ Xong' },
            'cancelled': { color: 'bg-red-50 text-red-700 border-red-200', text: '❌ Hủy' }
        };

        const HOURS = Array.from({length: 16}, (_, i) => `${String(i+6).padStart(2, '0')}:00`);

        // CORE LOGIC
        function dateKey(d) { return d.toISOString().slice(0, 10); }
        function formatDateVN(d) {
            const days = ['Chủ nhật','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7'];
            return `${days[d.getDay()]}, ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
        }

        function renderSchedule() {
            const key = dateKey(currentDate);
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('filterStatus').value;
            const today = bookings.filter(b => b.date === key);

            document.getElementById('statTotal').innerText = today.length;
            document.getElementById('statDone').innerText = today.filter(b=>b.status==='done').length;
            document.getElementById('statPending').innerText = today.filter(b=>b.status==='pending').length;
            const rev = today.filter(b=>b.status==='done'||b.status==='confirmed').reduce((s,b)=>s+(+b.price||0),0);
            document.getElementById('statRevenue').innerText = rev.toLocaleString('vi-VN') + 'đ';

            const container = document.getElementById('scheduleBody');
            container.innerHTML = '';

            HOURS.forEach(hour => {
                const slots = today.filter(b => b.timeStart === hour && (!filter || b.status === filter) && (!search || b.name.toLowerCase().includes(search) || b.phone.includes(search)));
                if (slots.length === 0 && (search || filter)) return;

                const row = document.createElement('div');
                row.className = "flex flex-col md:flex-row border-b border-blush/20 min-h-[80px]";
                row.ondragover = e => { e.preventDefault(); e.currentTarget.classList.add('bg-blush/20'); };
                row.ondragleave = e => e.currentTarget.classList.remove('bg-blush/20');
                row.ondrop = e => {
                    e.preventDefault();
                    e.currentTarget.classList.remove('bg-blush/20');
                    const id = e.dataTransfer.getData("text");
                    const idx = bookings.findIndex(b => b.id === id);
                    if (idx > -1) { 
                        bookings[idx].timeStart = hour; 
                        renderSchedule(); 
                        pushToSheet(); // Tự động lưu khi kéo thả
                    }
                };

                let cardHtml = slots.map(b => `
                    <div draggable="true" ondragstart="event.dataTransfer.setData('text','${b.id}')" class="booking-card bg-white border border-blush p-3 rounded-xl shadow-sm w-full md:w-72 relative group">
                        <div class="flex justify-between items-start mb-1">
                            <span class="font-bold text-sm">${b.name}</span>
                            <span class="text-[8px] font-bold px-1.5 py-0.5 rounded border ${STATUS_UI[b.status].color}">${STATUS_UI[b.status].text}</span>
                        </div>
                        <p class="text-[10px] text-deepRose font-medium mb-2">${b.service}</p>
                        <div class="text-[10px] text-gray-500 space-y-0.5">
                            ${b.phone ? `<span>📞 ${b.phone}</span><br>` : ''}
                            ${b.price ? `<span class="text-gold font-bold">💰 ${(+b.price).toLocaleString('vi-VN')}đ</span>` : ''}
                        </div>
                        <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editBooking('${b.id}')" class="p-1 bg-gray-50 rounded">✏️</button>
                            <button onclick="deleteBooking('${b.id}')" class="p-1 bg-red-50 rounded">🗑️</button>
                        </div>
                    </div>
                `).join('');

                row.innerHTML = `
                    <div class="w-full md:w-24 bg-cream/30 p-4 flex items-center justify-center border-r border-blush/10 font-serif font-bold text-deepRose text-lg">${hour}</div>
                    <div class="flex-1 p-3 flex flex-wrap gap-3 items-center min-h-[60px]">
                        ${cardHtml || `<button onclick="openModal('${hour}')" class="text-xs text-gray-300 hover:text-rose italic">+ Click để thêm lịch</button>`}
                    </div>
                `;
                container.appendChild(row);
            });
        }

        // SYNC LOGIC
        async function pullFromSheet() {
            if (isSyncing || SCRIPT_URL.includes("YOUR_GOOGLE")) return;
            isSyncing = true;
            document.getElementById('syncStatus').innerText = '⏳ Đang tải dữ liệu...';
            try {
                const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
                const result = await res.json();
                if (result.data) {
                    bookings = result.data;
                    localStorage.setItem('makeup_backup', JSON.stringify(bookings));
                    renderSchedule();
                    document.getElementById('syncStatus').innerText = '🟢 Đã đồng bộ';
                }
            } catch (e) {
                document.getElementById('syncStatus').innerText = '🔴 Lỗi kết nối cloud';
            }
            isSyncing = false;
        }

        async function pushToSheet() {
            if (isSyncing || SCRIPT_URL.includes("YOUR_GOOGLE")) return;
            isSyncing = true;
            document.getElementById('syncStatus').innerText = '⏳ Đang lưu cloud...';
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ action: 'update', data: bookings })
                });
                localStorage.setItem('makeup_backup', JSON.stringify(bookings));
                document.getElementById('syncStatus').innerText = '🟢 Đã lưu Cloud';
                showToast("✅ Đã lưu lên Google Sheets!");
            } catch (e) {
                document.getElementById('syncStatus').innerText = '🔴 Lỗi khi lưu';
                showToast("❌ Lỗi mạng, đã lưu tạm ở máy");
            }
            isSyncing = false;
        }

        // ACTIONS
        function saveBooking() {
            const name = document.getElementById('fName').value.trim();
            if (!name) return showToast('⚠️ Nhập tên khách hàng');
            const id = document.getElementById('editId').value;
            const data = {
                id: id || Date.now().toString(),
                date: dateKey(currentDate),
                timeStart: document.getElementById('fTimeStart').value,
                timeEnd: document.getElementById('fTimeEnd').value,
                name, service: document.getElementById('fService').value,
                phone: document.getElementById('fPhone').value,
                address: document.getElementById('fAddress').value,
                status: document.getElementById('fStatus').value,
                price: document.getElementById('fPrice').value,
                note: document.getElementById('fNote').value
            };
            if (id) bookings = bookings.map(b => b.id === id ? data : b);
            else bookings.push(data);
            
            renderSchedule();
            closeModal();
            pushToSheet(); // Tự động lưu ngay khi bấm nút Lưu
        }

        function deleteBooking(id) {
            if (confirm('Xóa lịch này?')) {
                bookings = bookings.filter(b => b.id !== id);
                renderSchedule();
                pushToSheet(); // Tự động lưu ngay khi xóa
            }
        }

        // UI HELPERS
        function openModal(h = '08:00') {
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').innerText = '✨ Thêm Lịch';
            ['fName','fPhone','fAddress','fNote','fPrice'].forEach(i => document.getElementById(i).value = '');
            document.getElementById('fTimeStart').innerHTML = HOURS.map(hr => `<option ${hr===h?'selected':''}>${hr}</option>`).join('');
            document.getElementById('fTimeEnd').innerHTML = `<option value="">--</option>` + HOURS.map(hr => `<option>${hr}</option>`).join('');
            document.getElementById('modalOverlay').classList.remove('hidden');
        }

        function editBooking(id) {
            const b = bookings.find(x => x.id === id);
            openModal(b.timeStart);
            document.getElementById('editId').value = id;
            document.getElementById('modalTitle').innerText = '✏️ Sửa Lịch';
            document.getElementById('fName').value = b.name;
            document.getElementById('fPhone').value = b.phone;
            document.getElementById('fAddress').value = b.address;
            document.getElementById('fPrice').value = b.price;
            document.getElementById('fNote').value = b.note;
            document.getElementById('fStatus').value = b.status;
            document.getElementById('fService').value = b.service;
        }

        function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
        function closeModalOutside(e) { if (e.target.id === 'modalOverlay') closeModal(); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.remove('translate-y-20','opacity-0'); setTimeout(()=>t.classList.add('translate-y-20','opacity-0'), 3000); }
        function onDatePick() { currentDate = new Date(document.getElementById('datePicker').value); updateDateDisplay(); renderSchedule(); pullFromSheet(); }
        function changeDate(d) { currentDate.setDate(currentDate.getDate() + d); updateDateDisplay(); renderSchedule(); pullFromSheet(); }
        function updateDateDisplay() { document.getElementById('currentDateLabel').innerText = formatDateVN(currentDate); document.getElementById('datePicker').value = dateKey(currentDate); }

        // INIT
        updateDateDisplay();
        const local = localStorage.getItem('makeup_backup');
        if (local) { bookings = JSON.parse(local); renderSchedule(); }
        pullFromSheet();
    </script>
</body>
</html>
